services:
  db:
    image: postgres:16
    container_name: realestate-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: realestate
      TZ: Asia/Ho_Chi_Minh
    command: postgres -c timezone=Asia/Ho_Chi_Minh
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d realestate"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: realestate-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://admin:secret@db:5432/realestate
      PAYLOAD_SECRET: mot-chuoi-bi-mat-bat-ky-dai-32-ky-tu
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data: